<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grade Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #7c6af5;
    --accent2: #e05aff;
    --green: #3ddc97;
    --red: #ff5470;
    --yellow: #ffd166;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --glow: 0 0 24px rgba(124,106,245,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,106,245,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(224,90,255,0.06) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo {
    font-size: 1.1rem; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo span { font-family: 'JetBrains Mono'; font-size: 0.7rem; color: var(--muted); -webkit-text-fill-color: var(--muted); display: block; font-weight: 400; }
  .header-badge {
    font-family: 'JetBrains Mono'; font-size: 0.7rem;
    background: rgba(124,106,245,0.15); border: 1px solid rgba(124,106,245,0.3);
    color: var(--accent); padding: 4px 12px; border-radius: 100px;
  }

  .container { max-width: 1400px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }
  .grid { display: grid; grid-template-columns: 380px 1fr; gap: 1.5rem; align-items: start; }
  @media(max-width: 960px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .card-header {
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .card-header h2 { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .card-icon { font-size: 1rem; }
  .card-body { padding: 1.5rem; }

  .tabs { display: flex; gap: 4px; padding: 1rem 1.5rem 0; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 8px 16px; font-size: 0.78rem; font-weight: 600;
    color: var(--muted); background: none; border: none; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all 0.2s; letter-spacing: 0.05em; text-transform: uppercase;
    font-family: 'Syne', sans-serif;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }
  .tab-content { display: none; padding: 1.5rem; }
  .tab-content.active { display: block; }

  .form-group { margin-bottom: 1rem; }
  label { display: block; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  input[type="text"], input[type="number"] {
    width: 100%; padding: 10px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: 'JetBrains Mono'; font-size: 0.9rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,245,0.15); }

  .btn {
    padding: 10px 20px; border: none; border-radius: 8px;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; text-transform: uppercase;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; width: 100%; padding: 12px;
    box-shadow: 0 4px 16px rgba(124,106,245,0.3);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(124,106,245,0.45); }
  .btn-sm { padding: 5px 12px; font-size: 0.7rem; border-radius: 6px; }
  .btn-danger { background: rgba(255,84,112,0.15); color: var(--red); border: 1px solid rgba(255,84,112,0.3); }
  .btn-danger:hover { background: rgba(255,84,112,0.25); }
  .btn-edit { background: rgba(124,106,245,0.15); color: var(--accent); border: 1px solid rgba(124,106,245,0.3); }
  .btn-edit:hover { background: rgba(124,106,245,0.25); }
  .btn-search { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-search:hover { border-color: var(--accent); }

  .search-row { display: flex; gap: 8px; }
  .search-row input { flex: 1; }

  .sort-bar { display: flex; gap: 8px; margin-bottom: 1rem; }
  .sort-btn {
    padding: 6px 14px; border-radius: 100px; font-size: 0.72rem; font-weight: 700;
    font-family: 'Syne', sans-serif; cursor: pointer; transition: all 0.2s;
    background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .sort-btn.active { background: rgba(124,106,245,0.2); border-color: var(--accent); color: var(--accent); }

  .student-list { display: flex; flex-direction: column; gap: 8px; }
  .student-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
    transition: border-color 0.2s;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
  .student-item:hover { border-color: rgba(124,106,245,0.3); }
  .student-rank {
    font-family: 'JetBrains Mono'; font-size: 0.65rem; color: var(--muted);
    width: 22px; text-align: center; flex-shrink: 0;
  }
  .student-name { flex: 1; font-weight: 600; font-size: 0.9rem; }
  .grade-badge {
    font-family: 'JetBrains Mono'; font-size: 1rem; font-weight: 500;
    padding: 4px 10px; border-radius: 6px;
    background: var(--surface); border: 1px solid var(--border);
  }
  .grade-a { color: var(--green); border-color: rgba(61,220,151,0.25); background: rgba(61,220,151,0.08); }
  .grade-b { color: #5bc8f5; border-color: rgba(91,200,245,0.25); background: rgba(91,200,245,0.08); }
  .grade-c { color: var(--yellow); border-color: rgba(255,209,102,0.25); background: rgba(255,209,102,0.08); }
  .grade-d { color: #ff9f43; border-color: rgba(255,159,67,0.25); background: rgba(255,159,67,0.08); }
  .grade-f { color: var(--red); border-color: rgba(255,84,112,0.25); background: rgba(255,84,112,0.08); }
  .status-pill {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em;
    padding: 3px 8px; border-radius: 100px;
  }
  .status-pass { background: rgba(61,220,151,0.15); color: var(--green); }
  .status-fail { background: rgba(255,84,112,0.15); color: var(--red); }
  .item-actions { display: flex; gap: 6px; }
  .empty-state { text-align: center; padding: 3rem; color: var(--muted); }
  .empty-state .big { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .empty-state p { font-size: 0.82rem; }

  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.2rem;
    position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(124,106,245,0.05));
  }
  .stat-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .stat-value { font-size: 1.6rem; font-weight: 800; font-family: 'JetBrains Mono'; line-height: 1; }
  .stat-sub { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
  .stat-avg .stat-value { color: var(--accent); }
  .stat-high .stat-value { color: var(--green); }
  .stat-low .stat-value { color: var(--red); }
  .stat-gpa .stat-value { color: var(--yellow); }

  .pf-section { margin-bottom: 1.5rem; }
  .pf-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .pf-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .pf-bar { height: 8px; background: var(--surface2); border-radius: 100px; overflow: hidden; display: flex; gap: 2px; }
  .pf-pass { background: var(--green); border-radius: 100px; transition: width 0.6s ease; }
  .pf-fail { background: var(--red); border-radius: 100px; transition: width 0.6s ease; }
  .pf-counts { display: flex; justify-content: space-between; margin-top: 6px; }
  .pf-count { font-size: 0.72rem; font-family: 'JetBrains Mono'; }
  .pass-c { color: var(--green); }
  .fail-c { color: var(--red); }

  .leaderboard { margin-bottom: 1.5rem; }
  .leaderboard h3 { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .podium-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-radius: 10px;
    margin-bottom: 6px; border: 1px solid var(--border);
  }
  .podium-1 { background: rgba(255,215,0,0.06); border-color: rgba(255,215,0,0.2); }
  .podium-2 { background: rgba(192,192,192,0.05); border-color: rgba(192,192,192,0.15); }
  .podium-3 { background: rgba(205,127,50,0.05); border-color: rgba(205,127,50,0.15); }
  .medal { font-size: 1.2rem; width: 28px; text-align: center; }
  .podium-name { flex: 1; font-weight: 600; font-size: 0.88rem; }
  .podium-grade { font-family: 'JetBrains Mono'; font-size: 0.9rem; font-weight: 500; }

  .dist-section h3 { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .dist-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .dist-label { font-family: 'JetBrains Mono'; font-size: 0.72rem; color: var(--muted); width: 80px; flex-shrink: 0; }
  .dist-bar-bg { flex: 1; height: 6px; background: var(--surface2); border-radius: 100px; overflow: hidden; }
  .dist-bar-fill { height: 100%; border-radius: 100px; transition: width 0.6s ease; min-width: 2px; }
  .dist-count { font-family: 'JetBrains Mono'; font-size: 0.7rem; color: var(--muted); width: 20px; text-align: right; }

  #toast {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 999;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
    font-size: 0.82rem; max-width: 300px;
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s ease;
    display: flex; align-items: center; gap: 10px;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: rgba(61,220,151,0.4); }
  #toast.error { border-color: rgba(255,84,112,0.4); }
  .toast-icon { font-size: 1rem; }

  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 2rem; width: 100%; max-width: 380px;
    transform: scale(0.95); transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1.5rem; }
  .modal-actions { display: flex; gap: 10px; margin-top: 1.5rem; }
  .btn-ghost { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); flex: 1; }
  .btn-ghost:hover { color: var(--text); }
  .btn-confirm { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; flex: 1; }

  .search-result {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; margin-top: 12px;
    display: none;
  }
  .search-result.visible { display: block; animation: slideIn 0.3s ease; }
  .sr-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
  .sr-details { display: flex; gap: 10px; flex-wrap: wrap; }
  .sr-detail { font-family: 'JetBrains Mono'; font-size: 0.78rem; color: var(--muted); }
  .sr-detail span { color: var(--text); }

  .count-pill {
    font-family: 'JetBrains Mono'; font-size: 0.65rem;
    background: rgba(124,106,245,0.2); color: var(--accent);
    padding: 2px 8px; border-radius: 100px; margin-left: auto;
  }
  hr.divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
</style>
</head>
<body>

<header>
  <div class="logo">
    GradeManager
    <span>// Student Academic Tracker</span>
  </div>
  <div class="header-badge" id="studentCount">0 students</div>
</header>

<div class="container">
  <div class="grid">

    <!-- LEFT PANEL -->
    <div>
      <!-- ADD STUDENT -->
      <div class="card" style="margin-bottom:1.5rem">
        <div class="card-header">
          <span class="card-icon">＋</span>
          <h2>Add Student</h2>
        </div>
        <div class="card-body">
          <div class="form-group">
            <label>Student Name</label>
            <input type="text" id="addName" placeholder="e.g. Juan dela Cruz"/>
          </div>
          <div class="form-group">
            <label>Grade (0 – 100)</label>
            <input type="number" id="addGrade" placeholder="e.g. 87" min="0" max="100" step="0.01"/>
          </div>
          <button class="btn btn-primary" onclick="addStudent()">Add Student</button>
        </div>
      </div>

      <!-- SEARCH -->
      <div class="card" style="margin-bottom:1.5rem">
        <div class="card-header">
          <span class="card-icon">🔍</span>
          <h2>Search Student</h2>
        </div>
        <div class="card-body">
          <div class="search-row">
            <input type="text" id="searchInput" placeholder="Enter student name..." onkeydown="if(event.key==='Enter')searchStudent()"/>
            <button class="btn btn-search btn-sm" onclick="searchStudent()">Search</button>
          </div>
          <div class="search-result" id="searchResult"></div>
        </div>
      </div>

      <!-- STATS PANEL -->
      <div class="card" id="statsCard">
        <div class="card-header">
          <span class="card-icon">📊</span>
          <h2>Statistics</h2>
        </div>
        <div class="card-body" id="statsBody">
          <div class="empty-state">
            <div class="big">📈</div>
            <p>Add students to see statistics</p>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('all',this)">All Students</button>
        <button class="tab" onclick="switchTab('sort',this)">Sort & Filter</button>
      </div>

      <!-- ALL STUDENTS TAB -->
      <div class="tab-content active" id="tab-all">
        <div class="sort-bar">
          <button class="sort-btn active" id="sortNameBtn" onclick="setSortStudents('name')">↕ Name</button>
          <button class="sort-btn" id="sortGradeBtn" onclick="setSortStudents('grade')">↕ Grade</button>
          <span class="count-pill" id="listCount">0</span>
        </div>
        <div class="student-list" id="studentList">
          <div class="empty-state">
            <div class="big">🎓</div>
            <p>No students yet. Add your first student!</p>
          </div>
        </div>
      </div>

      <!-- SORT TAB -->
      <div class="tab-content" id="tab-sort">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div>
            <div style="font-size:0.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">🏅 By Grade (High → Low)</div>
            <div class="student-list" id="sortedByGrade"></div>
          </div>
          <div>
            <div style="font-size:0.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">🔤 Alphabetical</div>
            <div class="student-list" id="sortedByName"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>✏️ Edit Grade</h3>
    <div class="form-group">
      <label>Student</label>
      <input type="text" id="editName" readonly style="opacity:0.6;cursor:not-allowed"/>
    </div>
    <div class="form-group">
      <label>New Grade (0 – 100)</label>
      <input type="number" id="editGrade" min="0" max="100" step="0.01"/>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-confirm btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"><span class="toast-icon" id="toastIcon"></span><span id="toastMsg"></span></div>

<script>
const API = 'http://localhost:5050/api';
let currentSort = 'name';

async function apiFetch(url, opts = {}) {
  const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
  return res.json();
}

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIcon').textContent = type === 'success' ? '✓' : '✗';
  el.className = `show ${type}`;
  setTimeout(() => el.className = '', 3000);
}

function getGradeClass(grade) {
  if (grade >= 90) return 'grade-a';
  if (grade >= 80) return 'grade-b';
  if (grade >= 70) return 'grade-c';
  if (grade >= 60) return 'grade-d';
  return 'grade-f';
}

function getLetter(grade) {
  if (grade >= 97) return 'A+'; if (grade >= 93) return 'A'; if (grade >= 90) return 'A-';
  if (grade >= 87) return 'B+'; if (grade >= 83) return 'B'; if (grade >= 80) return 'B-';
  if (grade >= 77) return 'C+'; if (grade >= 73) return 'C'; if (grade >= 70) return 'C-';
  if (grade >= 67) return 'D+'; if (grade >= 63) return 'D'; if (grade >= 60) return 'D-';
  return 'F';
}

function buildStudentItem(s, index, showActions = true) {
  const cls = getGradeClass(s.grade);
  const statusCls = s.status === 'Pass' ? 'status-pass' : 'status-fail';
  return `
    <div class="student-item">
      <div class="student-rank">${index + 1}</div>
      <div class="student-name">${s.name}</div>
      <span class="grade-badge ${cls}">${s.grade.toFixed(1)}</span>
      <span class="grade-badge ${cls}" style="min-width:36px;text-align:center;font-size:.75rem">${getLetter(s.grade)}</span>
      <span class="status-pill ${statusCls}">${s.status}</span>
      ${showActions ? `
      <div class="item-actions">
        <button class="btn btn-sm btn-edit" onclick="openEdit('${encodeURIComponent(s.name)}', ${s.grade})">✏️</button>
        <button class="btn btn-sm btn-danger" onclick="deleteStudent('${encodeURIComponent(s.name)}')">🗑️</button>
      </div>` : ''}
    </div>`;
}

async function loadAll() {
  const students = await apiFetch(`${API}/students?sort=${currentSort}`);
  const list = document.getElementById('studentList');
  document.getElementById('listCount').textContent = students.length;
  document.getElementById('studentCount').textContent = `${students.length} student${students.length !== 1 ? 's' : ''}`;

  if (!students.length) {
    list.innerHTML = `<div class="empty-state"><div class="big">🎓</div><p>No students yet. Add your first student!</p></div>`;
  } else {
    list.innerHTML = students.map((s, i) => buildStudentItem(s, i)).join('');
  }

  const byGrade = await apiFetch(`${API}/students?sort=grade`);
  const byName = await apiFetch(`${API}/students?sort=name`);
  document.getElementById('sortedByGrade').innerHTML = byGrade.length
    ? byGrade.map((s, i) => buildStudentItem(s, i, false)).join('')
    : '<div class="empty-state"><p>No students</p></div>';
  document.getElementById('sortedByName').innerHTML = byName.length
    ? byName.map((s, i) => buildStudentItem(s, i, false)).join('')
    : '<div class="empty-state"><p>No students</p></div>';

  await loadStats();
}

async function loadStats() {
  const s = await apiFetch(`${API}/stats`);
  const body = document.getElementById('statsBody');
  if (!s.hasData) {
    body.innerHTML = `<div class="empty-state"><div class="big">📈</div><p>Add students to see statistics</p></div>`;
    return;
  }

  const passPercent = s.count ? (s.passCount / s.count * 100) : 0;
  const failPercent = 100 - passPercent;
  const medals = ['🥇', '🥈', '🥉'];
  const distColors = ['#3ddc97','#5bc8f5','#ffd166','#ff9f43','#ff5470'];
  const distKeys = Object.keys(s.distribution);
  const maxDist = Math.max(...Object.values(s.distribution), 1);

  body.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card stat-avg">
        <div class="stat-label">Class Average</div>
        <div class="stat-value">${s.average}</div>
        <div class="stat-sub">${getLetter(s.average)} · GPA ${s.avgGpa}</div>
      </div>
      <div class="stat-card stat-gpa">
        <div class="stat-label">Avg GPA</div>
        <div class="stat-value">${s.avgGpa}</div>
        <div class="stat-sub">out of 4.0</div>
      </div>
      <div class="stat-card stat-high">
        <div class="stat-label">Highest</div>
        <div class="stat-value">${s.highest.grade}</div>
        <div class="stat-sub">${s.highest.name}</div>
      </div>
      <div class="stat-card stat-low">
        <div class="stat-label">Lowest</div>
        <div class="stat-value">${s.lowest.grade}</div>
        <div class="stat-sub">${s.lowest.name}</div>
      </div>
    </div>

    <div class="pf-section">
      <div class="pf-header">
        <div class="pf-label">Pass / Fail Rate</div>
      </div>
      <div class="pf-bar">
        <div class="pf-pass" style="width:${passPercent}%"></div>
        <div class="pf-fail" style="width:${failPercent}%"></div>
      </div>
      <div class="pf-counts">
        <span class="pf-count pass-c">✓ ${s.passCount} passed (≥75)</span>
        <span class="pf-count fail-c">✗ ${s.failCount} failed</span>
      </div>
    </div>

    <hr class="divider"/>

    <div class="leaderboard">
      <h3>🏆 Top 3 Leaderboard</h3>
      ${s.top3.map((t, i) => `
        <div class="podium-item podium-${t.rank}">
          <span class="medal">${medals[i]}</span>
          <span class="podium-name">${t.name}</span>
          <span class="podium-grade ${getGradeClass(t.grade)}">${t.grade.toFixed(1)} · ${t.letter}</span>
        </div>`).join('')}
    </div>

    <hr class="divider"/>

    <div class="dist-section">
      <h3>Grade Distribution</h3>
      ${distKeys.map((k, i) => `
        <div class="dist-row">
          <div class="dist-label">${k}</div>
          <div class="dist-bar-bg">
            <div class="dist-bar-fill" style="width:${s.distribution[k]/maxDist*100}%;background:${distColors[i]}"></div>
          </div>
          <div class="dist-count">${s.distribution[k]}</div>
        </div>`).join('')}
    </div>`;
}

async function addStudent() {
  const name = document.getElementById('addName').value.trim();
  const grade = parseFloat(document.getElementById('addGrade').value);
  if (!name) { toast('Please enter a student name.', 'error'); return; }
  if (isNaN(grade)) { toast('Please enter a valid grade.', 'error'); return; }
  if (grade < 0) { toast('Grade cannot be negative.', 'error'); return; }
  if (grade > 100) { toast('Grade cannot exceed 100.', 'error'); return; }

  const res = await apiFetch(`${API}/students`, { method: 'POST', body: JSON.stringify({ name, grade }) });
  if (res.success) {
    toast(res.message);
    document.getElementById('addName').value = '';
    document.getElementById('addGrade').value = '';
    await loadAll();
  } else {
    toast(res.message, 'error');
  }
}

async function deleteStudent(encodedName) {
  const name = decodeURIComponent(encodedName);
  if (!confirm(`Remove "${name}" from the roster?`)) return;
  const res = await apiFetch(`${API}/students/${encodedName}`, { method: 'DELETE' });
  if (res.success) { toast(res.message); await loadAll(); }
  else toast(res.message, 'error');
}

function openEdit(encodedName, grade) {
  document.getElementById('editName').value = decodeURIComponent(encodedName);
  document.getElementById('editGrade').value = grade;
  document.getElementById('editModal').classList.add('open');
}

function closeModal() { document.getElementById('editModal').classList.remove('open'); }

async function saveEdit() {
  const name = document.getElementById('editName').value;
  const grade = parseFloat(document.getElementById('editGrade').value);
  if (isNaN(grade) || grade < 0 || grade > 100) { toast('Invalid grade (0-100).', 'error'); return; }
  const res = await apiFetch(`${API}/students/${encodeURIComponent(name)}`, { method: 'PUT', body: JSON.stringify({ grade }) });
  if (res.success) { toast(res.message); closeModal(); await loadAll(); }
  else toast(res.message, 'error');
}

async function searchStudent() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const res = await apiFetch(`${API}/search?q=${encodeURIComponent(q)}`);
  const el = document.getElementById('searchResult');
  if (res.name) {
    const cls = getGradeClass(res.grade);
    el.className = 'search-result visible';
    el.innerHTML = `
      <div class="sr-name">${res.name}</div>
      <div class="sr-details">
        <div class="sr-detail">Grade: <span class="${cls}">${res.grade.toFixed(1)}</span></div>
        <div class="sr-detail">Letter: <span class="${cls}">${getLetter(res.grade)}</span></div>
        <div class="sr-detail">GPA: <span>${res.gpa.toFixed(1)}</span></div>
        <div class="sr-detail">Status: <span class="${res.status === 'Pass' ? 'pass-c' : 'fail-c'}">${res.status}</span></div>
      </div>`;
  } else {
    el.className = 'search-result visible';
    el.innerHTML = `<div style="color:var(--muted);font-size:.82rem">No student found with name "${q}"</div>`;
  }
}

function setSortStudents(type) {
  currentSort = type;
  document.getElementById('sortNameBtn').classList.toggle('active', type === 'name');
  document.getElementById('sortGradeBtn').classList.toggle('active', type === 'grade');
  loadAll();
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
  if (name === 'sort') loadAll();
}

document.getElementById('addGrade').addEventListener('keydown', e => { if (e.key === 'Enter') addStudent(); });
document.getElementById('addName').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('addGrade').focus(); });
document.getElementById('editModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

loadAll();
</script>
</body>
</html>
